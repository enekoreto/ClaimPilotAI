services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: claimpilot
      POSTGRES_PASSWORD: claimpilot
      POSTGRES_DB: claimpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://claimpilot:claimpilot@postgres:5432/claimpilot
      LLM_PROVIDER: deterministic
      VECTOR_STORE: local
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --port 5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
